# Credenciales fake para LocalStack (no son credenciales AWS reales)
apiVersion: v1
kind: Secret
metadata:
  name: localstack-aws-credentials
  namespace: chess-tournament
type: Opaque
stringData:
  access-key: "test"
  secret-access-key: "test"
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: localstack-secretsmanager
  namespace: chess-tournament
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        secretRef:
          accessKeyIDSecretRef:
            name: localstack-aws-credentials
            key: access-key
          secretAccessKeySecretRef:
            name: localstack-aws-credentials
            key: secret-access-key
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: chess-tournament-bot-secret
  namespace: chess-tournament
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: localstack-secretsmanager
    kind: SecretStore
  target:
    name: chess-tournament-bot-secret
    creationPolicy: Owner
  data:
    - secretKey: TELEGRAM_BOT_TOKEN
      remoteRef:
        key: chess-tournament-bot/telegram-token
        property: TELEGRAM_BOT_TOKEN
